services:
  - type: web
    name: ufc-analysis-api
    runtime: docker
    branch: main
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ufc-analysis-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.12"
      - key: API_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MODEL_VERSION
        value: phase2-v1
      - key: CONTEXT_ENGINE_ENABLED
        value: "true"

databases:
  - name: ufc-analysis-db
    databaseName: ufc_analysis
    user: ufc_analysis
